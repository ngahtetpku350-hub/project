<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Signup - Responsive</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .signup-card{
            width: 70%;
            background: #F5F5F7;
            border-radius: 20px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 500px;
        }
        .signup-card-form{
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .signup-section{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            width: 90%;
        }
        .signup-section input{
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 15px;
            max-width: 300px;
        }
        .signup-account {
            text-align: center;
            
        }
        .signup-account i{
            margin: 30px;
            cursor: pointer;
            /* background: black; */
        }
        .btnregister:hover{
            background: white;
        }
        .btngoogle{
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .btngoogle input{
            width: 100%;
            max-width: 300px;
            padding: 8px;
            border-radius: 20px;
            color: white;
            background: blue;
            cursor: pointer;
            font-weight: bold;
        }



        </style>

</head>
<body>
    <section class="signup-card">
        <div class="signup-card-form">
            <div class="signup-title">
                <h2 style="text-align: center;">Create Account</h2>
            </div>
            <div class="signup-section">
                <input type="text" placeholder="Enter your Email">
                <input type="password" placeholder="Set password">
                <input type="password" placeholder="Confirm your password">
                <input class="btnregister" type="submit" value="Register">
            </div>
            <div>
                <p style="text-align: center;">Register with......</p>
            </div>
            <div class="btngoogle">
                <input type="submit" value="Register with Google">
            </div>
            <div class="signup-account">
                <i class="g-icon fa-brands fa-google"></i>
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-tiktok"></i>
            </div>
            <div class="login-link">
                <span>Already have an account? </span>
                <a href="login.html">Login here</a>
            </div>
        </div>
    </section>
</body>
</html>
