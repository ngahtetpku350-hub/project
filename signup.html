<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Signup - Responsive</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        </style>

</head>
<body>
    <section class="signup-card">
        <div class="signup-card-form">
            <div class="signup-title">
                <h2 style="text-align: center;">Create Account</h2>
            </div>
            <div class="signup-section">
                <input type="text" placeholder="Enter your Email">
                <input type="password" placeholder="Set password">
                <input type="password" placeholder="Confirm your password">
                <input style="border: 1px solid black;" class="btnregister" type="submit" value="Register">
            </div>
            <div>
                <p style="text-align: center;">Register with......</p>
            </div>
            <div class="btngoogle">
                <input type="submit" value="Register with Google">
            </div>
            <div class="signup-account">
                <i class="g-icon fa-brands fa-google"></i>
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-tiktok"></i>
            </div>
            <div class="login-link">
                <span>Already have an account? </span>
                <a href="login.html">Login here</a>
            </div>
        </div>
    </section>
</body>
</html>
