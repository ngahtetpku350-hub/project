<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login Page</title>
</head>
<style>
    #body{
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;

    }
    .login-card{
        display: flex;
        align-items: center;
        justify-content: space-around;
        border: 1px solid black;
        width: 70%;
        height: 500px;
        border-radius: 20px;
        
    } 
    .login-input{
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    .login-input input{
        width: 90%;
        padding: 8px;
        border-radius: 10px;
    }
    #login-btn{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    #login-btn button{
        width: 200px;
        color: white;
        background: blue;
        border: 1px solid black;
        padding: 8px;
        border-radius: 20px;
    }
    #login-btn a{
        color: white;
        margin-top: 20px;
    }
    .login-img img{
        width: 300px;
        height: 300px;
    }
    .login-input-section{
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        background:#F5F5F7;
        width: 280px;
        height: 400px;
        gap: 30px;
        border-radius: 20px;
    }
</style>
<body>
    <section id="body">
            <div class="login-card">
                <div class="login-img">
                    <img src="../img/login-img.avif" alt="login logo">
                </div>
                <div class="login-input-section">
                    <div class="login-input">
                        <input type="text" placeholder="email or phone">
                        <input type="password" placeholder="Enter your password">
                    </div>
                    <div id="login-btn">
                        <button>Login</button>
                        <a href="#">Forget password</a>
                    </div>
                </div>
            </div>
    </section>
</body>
</html>
